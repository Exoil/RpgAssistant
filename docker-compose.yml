version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - ASPNETCORE_HTTP_PORT=8080
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_RUNNING_IN_CONTAINER=true
      - USER_SECRETS_ID=98d1e339-8186-4a3d-803e-47ecb5804bfb
      - DOTNET_USER_SECRETS=/root/.microsoft/usersecrets/$USER_SECRETS_ID
      - $APPDATA/Microsoft/UserSecrets/$USER_SECRETS_ID:/root/.microsoft/usersecrets/$USER_SECRETS_ID
      - $HOME/.microsoft/usersecrets/$USER_SECRETS_ID:/root/.microsoft/usersecrets/$USER_SECRETS_ID
    volumes:
      - $HOME/.microsoft/usersecrets/$USER_SECRETS_ID:/root/.microsoft/usersecrets/$USER_SECRETS_ID
    depends_on:
      - neo4j
    networks:
      - rpg_network

  neo4j:
    image: neo4j:latest
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/s3cr3ts3cr3t
      - NEO4J_dbms_default__database=RpgCampaignDb
      - NEO4J_dbms_default__advertised__address=neo4j
      - NEO4J_dbms_ssl_policy_bolt_client__auth=NONE
      - NEO4J_dbms_ssl_policy_https_client__auth=NONE
      - NEO4J_dbms_default__listen__address=0.0.0.0
      - NEO4J_dbms_security_auth__enabled=false
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
    volumes:
      - neo4j_data:/data
    networks:
      - rpg_network

volumes:
  neo4j_data:
    driver: local

networks:
  rpg_network:
    driver: bridge