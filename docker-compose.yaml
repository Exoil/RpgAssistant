## Deployment profile (see ADR-0003):
##   - `foundry` → API + DB + CORS-enabled gateway on :8080 + Foundry on :30000
##
## Run with:   docker compose --profile foundry up
##
## `api` and `neo4j` have no profile so they always start. The UI itself
## (Loreweave UI, the Foundry module) lives in a separate repository:
## https://github.com/Exoil/Loreweave-plugin
##
## Before bringing the `foundry` profile up, build the module in that repo
## (`bun run build:foundry`) and bind-mount its `dist/` into the foundry
## service below — see the foundry service's volumes section.

services:
  gateway:
    profiles: ["foundry"]
    image: nginx:1.27-alpine
    container_name: rpgassistant-gateway
    depends_on:
      - api
    ports:
      - "8080:80"
    volumes:
      - ./gateways-config-sample/gateway/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    networks:
      - app_net
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rpgassistant-api
    depends_on:
      neo4j:
        condition: service_healthy
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Neo4j__ConnectionString: "bolt://neo4j:17687"
      Neo4j__UserName: "neo4j"
      Neo4j__Password: "${NEO4J_PASSWORD}"
    networks:
      - app_net
    restart: unless-stopped

  neo4j:
    image: neo4j:latest
    hostname: neo4j
    container_name: neo4j
    ports:
      - "17474:17474" # Neo4j Browser (HTTP) on host:17474
      - "17687:17687" # Bolt on host:17687
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"

      # Neo4j listens on these ports INSIDE the container:
      NEO4J_server_http_listen__address: "0.0.0.0:17474"
      NEO4J_server_bolt_listen__address: "0.0.0.0:17687"

      NEO4J_server_memory_pagecache_size: 512M
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 512M
    volumes:
      - $HOME/neo4j/logs:/logs
      - $HOME/neo4j/config:/config
      - $HOME/neo4j/data:/data
      - $HOME/neo4j/plugins:/plugins
    networks:
      - app_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:17474/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  foundry:
    profiles: ["foundry"]
    image: ghcr.io/felddy/foundryvtt:14
    # License is bound to `hostname` — do not change casually.
    hostname: rpgassistant-foundry
    container_name: rpgassistant-foundry
    depends_on:
      - api
    ports:
      - "30000:30000"
    environment:
      FOUNDRY_USERNAME: "${FOUNDRY_USERNAME}"
      FOUNDRY_PASSWORD: "${FOUNDRY_PASSWORD}"
      FOUNDRY_ADMIN_KEY: "${FOUNDRY_ADMIN_KEY}"
      # Optional: the long key from your foundryvtt.com email
      # (format XXXXX-XXXXX-XXXXX-XXXXX-XXXXX-XXXXX). Only needed if you
      # leave USERNAME/PASSWORD empty; with both set, the container fetches
      # the license from foundryvtt.com on first run.
      FOUNDRY_LICENSE_KEY: "${FOUNDRY_LICENSE_KEY:-}"
      FOUNDRY_TELEMETRY: "false"
    volumes:
      - $HOME/foundry/data:/data
      # Loreweave UI lives in a separate repo (Exoil/Loreweave-plugin).
      # Build it there with `bun run build:foundry`; vite.config.foundry.ts
      # copies module.json and lang/ into dist/, so dist/ IS the module
      # folder. Adjust the host path below to wherever you cloned it.
      - ../../LoreweaveUi/dist:/data/Data/modules/loreweave-ui:ro
    networks:
      - app_net
    restart: unless-stopped

networks:
  app_net:
    driver: bridge
