services:
  gateway:
    image: nginx:1.27-alpine
    container_name: rpgassistant-gateway
    depends_on:
      - api
      - ui
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    networks:
      - app_net
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rpgassistant-api
    depends_on:
      neo4j:
        condition: service_healthy
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Neo4j__ConnectionString: "bolt://neo4j:17687"
      Neo4j__UserName: "neo4j"
      Neo4j__Password: "${NEO4J_PASSWORD}"
    networks:
      - app_net
    restart: unless-stopped

  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rpgassistant-ui
    expose:
      - "80"
    networks:
      - app_net
    restart: unless-stopped

  neo4j:
    image: neo4j:latest
    hostname: neo4j
    container_name: neo4j
    ports:
      - "17474:17474" # Neo4j Browser (HTTP) on host:17474
      - "17687:17687" # Bolt on host:17687
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"

      # Neo4j listens on these ports INSIDE the container:
      NEO4J_server_http_listen__address: "0.0.0.0:17474"
      NEO4J_server_bolt_listen__address: "0.0.0.0:17687"

      NEO4J_server_memory_pagecache_size: 512M
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 512M
    volumes:
      - $HOME/neo4j/logs:/logs
      - $HOME/neo4j/config:/config
      - $HOME/neo4j/data:/data
      - $HOME/neo4j/plugins:/plugins
    networks:
      - app_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:17474/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

networks:
  app_net:
    driver: bridge
