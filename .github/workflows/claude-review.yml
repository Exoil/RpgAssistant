name: Claude review

# Conservative triggers to protect a Pro-tier Claude.ai quota:
# - Auto-review only when a PR is opened or reopened (skip every push).
# - Manual re-trigger by writing "@claude" anywhere in a PR comment or review.
on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Run on:
    #  - the PR open/reopen/ready events above, OR
    #  - any comment / review whose body contains "@claude".
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "Review this pull request for correctness, bugs, security issues, and adherence to the repository's CLAUDE.md rules. Post inline comments where appropriate and a short summary at the end."
